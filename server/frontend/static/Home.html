<html>
<head>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="stylesheet" href="/static/bootstrap.min.css">
<script>
// Función para cerrar sesión (logout)
const logout = async () => {
    const logoutUrl = window.location.origin + "/djangoapp/logout";
    try {
        const response = await fetch(logoutUrl, { method: "GET" });
        const data = await response.json();
        if (data.userName === "") {
            sessionStorage.removeItem("username");
            // Recargar la página para actualizar la interfaz
            window.location.reload();
        } else {
            alert("Logout failed");
        }
    } catch (error) {
        console.error("Error during logout:", error);
        alert("Logout error");
    }
};

// Función para mostrar el estado de sesión en la barra de navegación
let checkSession = () => {
    let curr_user = sessionStorage.getItem("username");
    const loginlogoutDiv = document.getElementById("loginlogout");
    if (curr_user && curr_user !== "") {
        loginlogoutDiv.innerHTML = 
            '<span class="homepage_links" style="margin-right: 15px;">Hola, ' + curr_user + '</span>' +
            '<a class="homepage_links" href="#" onclick="logout(); return false;">Logout</a>';
    } else {
        loginlogoutDiv.innerHTML = 
            '<a class="homepage_links" href="/login">Login</a>' +
            '<a class="homepage_links" href="/register" style="margin-left: 15px;">Register</a>';
    }
};
</script>
</head>
<body onload="checkSession()">
<nav class="navbar navbar-expand-lg navbar-light" style="background-color:darkturquoise; height: 1in;">
  <div class="container-fluid">
    <h2 style="padding-right: 5%;">Best Cars Dealership</h2>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarText" aria-controls="navbarText" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarText">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link active" style="font-size: larger;" href="/">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" style="font-size: larger;" href="/about">About Us</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" style="font-size: larger;" href="/contact">Contact Us</a>
        </li>
      </ul>
      <span class="navbar-text">
        <div class="loginlink" id="loginlogout"></div>
      </span>
    </div>
  </div>
</nav>
<div style="display: flex;flex-direction: column;">
  <div class="card" style="width: 50%;margin-top: 50px;align-self: center;">
    <img src="/static/car_dealership.jpg" class="card-img-top" alt="Dealership">
    <div class="banner" style="padding: 20px; text-align: center;">
      <h5>Welcome to our Dealerships!</h5>
      <a href="/dealers" class="btn" style="background-color: aqua; margin:10px">View Dealerships</a>
    </div>
  </div>
</div>
</body>
</html>
