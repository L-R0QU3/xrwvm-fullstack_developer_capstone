name: 'Lint Code'

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8
      - name: Run Linter on Python files
        run: |
          cd server
          # Excluir migraciones e ignorar líneas largas (E501)
          flake8 . --exclude=djangoapp/migrations --ignore=E501
          echo "Linted all Python files successfully"

  lint_js:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3
      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install JSHint
        run: npm install -g jshint
      - name: Create JSHint config
        run: |
          echo '{"esversion": 8, "sub": true}' > .jshintrc
      - name: Run Linter on JS files
        run: |
          cd server/database
          jshint --config ../../.jshintrc .
          echo "Linted all JavaScript files successfully"
